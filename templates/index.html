<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensable</title>
    <!-- Modern Font Option -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --success-hover: #059669;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --bg-blur: rgba(255, 255, 255, 0.05);
            --bg-blur-hover: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: #0f172a;
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(16, 185, 129, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(239, 68, 68, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            z-index: 10;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fade-in-down 0.8s ease-out forwards;
        }

        @keyframes fade-in-down {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #e0e7ff 0%, #818cf8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 20px rgba(99, 102, 241, 0.2);
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 1.25rem;
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: 24px;
            margin-bottom: 30px;
        }

        .glass-panel {
            background: var(--bg-blur);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .video-section {
            padding: 24px;
            animation: fade-in-up 0.8s ease-out backwards;
            animation-delay: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 500px;
        }

        @keyframes fade-in-up {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #videoElement {
            width: 100%;
            height: 100%;
            border-radius: 16px;
            background: #000;
            display: block;
            object-fit: cover;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .info-section {
            display: flex;
            flex-direction: column;
            gap: 24px;
            animation: fade-in-up 0.8s ease-out backwards;
            animation-delay: 0.4s;
        }

        .card {
            padding: 28px;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            background: var(--bg-blur-hover);
            transform: translateY(-2px);
        }

        .card h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #f1f5f9;
        }

        .card h2::before {
            content: '';
            display: block;
            width: 6px;
            height: 24px;
            background: linear-gradient(to bottom, #818cf8, #38bdf8);
            border-radius: 4px;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        button {
            padding: 16px 20px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 0.5px;
        }

        button::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 150%;
            height: 150%;
            background: rgba(255, 255, 255, 0.15);
            transform: translate(-50%, -50%) scale(0);
            border-radius: 50%;
            transition: transform 0.5s ease-out;
        }

        button:active::after {
            transform: translate(-50%, -50%) scale(1);
            transition: 0s;
        }

        #startBtn {
            background: var(--success);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
        }

        #startBtn:hover:not(:disabled) {
            background: var(--success-hover);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.35);
        }

        #stopBtn {
            background: var(--danger);
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.2);
        }

        #stopBtn:hover:not(:disabled) {
            background: var(--danger-hover);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(239, 68, 68, 0.35);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
        }

        .status {
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            background: rgba(15, 23, 42, 0.5);
        }

        .status.active {
            background: rgba(16, 185, 129, 0.1);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.2);
            text-shadow: 0 0 15px rgba(52, 211, 153, 0.4);
        }

        .status.active::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            box-shadow: inset 0 0 20px rgba(16, 185, 129, 0.15);
            animation: pulse-border 2.5s infinite;
        }

        @keyframes pulse-border {
            0% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.4;
            }
        }

        .status.inactive {
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .shortcuts {
            font-size: 0.85em;
            color: var(--text-muted);
            margin-top: 24px;
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 15px;
            opacity: 0.8;
        }

        .shortcuts kbd {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 6px;
            font-family: monospace;
            font-weight: 500;
            color: #fff;
            border-bottom: 2px solid rgba(0, 0, 0, 0.3);
            letter-spacing: 1px;
        }

        #currentMessage {
            font-size: 1.3rem;
            font-weight: 500;
            padding: 24px;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 16px;
            text-align: center;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.2);
            line-height: 1.5;
            color: #e2e8f0;
        }

        #detectionsList {
            max-height: 320px;
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 8px;
        }

        /* Scrollbar styling */
        #detectionsList::-webkit-scrollbar {
            width: 6px;
        }

        #detectionsList::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
        }

        #detectionsList::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        #detectionsList::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .detection-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 14px;
            border-left: 4px solid #818cf8;
            animation: slide-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .detection-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(4px);
        }

        @keyframes slide-in {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .detection-item strong {
            color: #a5b4fc;
            font-size: 1.15em;
            letter-spacing: 0.5px;
        }

        .no-detections {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-muted);
            font-style: italic;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .no-detections svg {
            opacity: 0.3;
            width: 48px;
            height: 48px;
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .controls {
                grid-template-columns: 1fr;
            }

            .video-section {
                min-height: 300px;
            }

            h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Sensable</h1>
            <p class="subtitle">AI-Powered Obstacle Detection for Visually Impaired Users</p>
        </header>

        <div class="main-content">
            <div class="video-section glass-panel">
                <video id="videoElement" autoplay playsinline></video>
            </div>

            <div class="info-section">
                <div class="card glass-panel">
                    <h2>Controls</h2>
                    <div class="controls">
                        <button id="startBtn">Start Navigation</button>
                        <button id="stopBtn" disabled>Stop</button>
                        <button id="fullscreenBtn" disabled>Full Screen Video</button>
                    </div>
                    <div id="status" class="status inactive">System Ready</div>
                    <div class="shortcuts">
                        <p><kbd>Space</kbd> Start/Stop &nbsp;&nbsp;&bull;&nbsp;&nbsp; <kbd>M</kbd> Mute Audio</p>
                    </div>
                </div>

                <div class="card glass-panel">
                    <h2>Current Guidance</h2>
                    <div id="currentMessage">Waiting to start...</div>
                </div>

                <div class="card glass-panel">
                    <h2>Detected Objects</h2>
                    <div id="detectionsList">
                        <div class="no-detections">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            No objects detected yet
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('videoElement');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const statusDiv = document.getElementById('status');
        const messageDiv = document.getElementById('currentMessage');
        const detectionsList = document.getElementById('detectionsList');

        let stream = null;
        let detectionInterval = null;
        let isRunning = false;
        let isMuted = false;
        let currentAudio = null;
        let isAudioPlaying = false;

        function isVideoFullscreen() {
            return document.fullscreenElement === video;
        }

        async function toggleVideoFullscreen() {
            try {
                if (!document.fullscreenElement) {
                    // Fullscreen needs a user gesture; this runs from a button click / key press.
                    if (video.requestFullscreen) {
                        await video.requestFullscreen();
                    } else if (video.webkitRequestFullscreen) {
                        // Safari fallback
                        await video.webkitRequestFullscreen();
                    }
                } else {
                    if (document.exitFullscreen) {
                        await document.exitFullscreen();
                    }
                }
            } catch (e) {
                console.log('Fullscreen error:', e);
            }
        }

        // Keep button label in sync with the browser fullscreen state.
        document.addEventListener('fullscreenchange', () => {
            if (isVideoFullscreen()) {
                fullscreenBtn.textContent = 'Exit Full Screen';
            } else {
                fullscreenBtn.textContent = 'Full Screen Video';
            }
        });

        // Initialize camera
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' },
                    audio: false
                });
                video.srcObject = stream;
                return true;
            } catch (error) {
                console.error('Camera error:', error);
                alert('Unable to access camera. Please grant camera permissions.');
                return false;
            }
        }

        // Stop camera
        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                stream = null;
            }
        }

        // Capture frame from video
        function captureFrame() {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            return canvas.toDataURL('image/jpeg', 0.8);
        }

        // Send frame for detection
        async function detectObjects() {
            if (!isRunning) return;

            try {
                const imageData = captureFrame();

                const response = await fetch('/detect', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ image: imageData })
                });

                const data = await response.json();

                if (data.error) {
                    console.error('Detection error:', data.error);
                    return;
                }

                // Update UI
                updateDetections(data.detections);
                updateMessage(data.message);

                // Play audio guidance
                if (data.audio_file && !isMuted && !isAudioPlaying) {
                    playAudio(data.audio_file);
                }

            } catch (error) {
                console.error('Detection request error:', error);
            }
        }

        // Update detections list
        function updateDetections(detections) {
            if (!detections || detections.length === 0) {
                detectionsList.innerHTML = `
                    <div class="no-detections">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                        No obstacles detected
                    </div>
                `;
                return;
            }

            detectionsList.innerHTML = detections.map(det => `
                <div class="detection-item">
                    <strong>${det.object}</strong> - ${det.position}
                    <br><small>Confidence: ${(det.confidence * 100).toFixed(0)}% &bull; ${det.distance}</small>
                </div>
            `).join('');
        }

        // Update current message
        function updateMessage(message) {
            messageDiv.textContent = message || 'Scanning...';
        }

        // Play audio
        function playAudio(filename) {
            // Stop current audio if playing
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }

            isAudioPlaying = true;
            currentAudio = new Audio(`/audio/${filename}`);

            // Reset flag when audio ends
            currentAudio.onended = () => {
                isAudioPlaying = false;
            };

            // Handle errors
            currentAudio.onerror = () => {
                isAudioPlaying = false;
                console.log('Audio play error');
            };

            currentAudio.play().catch(e => {
                isAudioPlaying = false;
                console.log('Audio play error:', e);
            });
        }

        // Start navigation
        async function startNavigation() {
            const cameraStarted = await startCamera();
            if (!cameraStarted) return;

            isRunning = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            fullscreenBtn.disabled = false;
            statusDiv.textContent = 'Navigation Active';
            statusDiv.className = 'status active';

            // Start detection loop (every 2 seconds for less frequent updates)
            detectionInterval = setInterval(detectObjects, 2000);
        }

        // Stop navigation
        function stopNavigation() {
            isRunning = false;
            clearInterval(detectionInterval);
            stopCamera();

            startBtn.disabled = false;
            stopBtn.disabled = true;
            fullscreenBtn.disabled = true;
            // If we're currently fullscreening the video, exit so the UI returns.
            if (document.fullscreenElement && isVideoFullscreen() && document.exitFullscreen) {
                document.exitFullscreen();
            }
            statusDiv.textContent = 'Navigation Stopped';
            statusDiv.className = 'status inactive';
            messageDiv.textContent = 'Stopped';
            detectionsList.innerHTML = `
                <div class="no-detections">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                    Navigation stopped
                </div>
            `;

            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            isAudioPlaying = false;
        }

        // Event listeners
        startBtn.addEventListener('click', startNavigation);
        stopBtn.addEventListener('click', stopNavigation);
        fullscreenBtn.addEventListener('click', toggleVideoFullscreen);

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (isRunning) {
                    stopNavigation();
                } else {
                    startNavigation();
                }
            } else if (e.code === 'KeyM') {
                isMuted = !isMuted;
                alert(isMuted ? 'Audio muted' : 'Audio unmuted');
            } else if (e.code === 'KeyF') {
                // Fullscreen shortcut (only meaningful while running)
                if (isRunning) {
                    e.preventDefault();
                    toggleVideoFullscreen();
                }
            }
        });

        // Initial message
        console.log('Sensable loaded');
        console.log('Press Space to start/stop navigation');
    </script>
</body>

</html>
