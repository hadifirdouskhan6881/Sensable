<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Navigation Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .video-section {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        #videoElement {
            width: 100%;
            border-radius: 10px;
            background: #000;
            display: block;
        }

        .info-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .card h2 {
            font-size: 1.5em;
            margin-bottom: 15px;
            border-bottom: 2px solid rgba(255,255,255,0.3);
            padding-bottom: 10px;
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 120px;
            padding: 15px 25px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        #startBtn {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
        }

        #startBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76,175,80,0.4);
        }

        #stopBtn {
            background: linear-gradient(135deg, #f44336, #da190b);
            color: white;
        }

        #stopBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(244,67,54,0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.1em;
            font-weight: bold;
        }

        .status.active {
            background: linear-gradient(135deg, #4CAF50, #45a049);
        }

        .status.inactive {
            background: rgba(255,255,255,0.2);
        }

        #detectionsList {
            max-height: 300px;
            overflow-y: auto;
        }

        .detection-item {
            background: rgba(255,255,255,0.15);
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid #4CAF50;
        }

        .detection-item strong {
            color: #4CAF50;
            font-size: 1.1em;
        }

        .no-detections {
            text-align: center;
            padding: 30px;
            opacity: 0.7;
            font-style: italic;
        }

        #currentMessage {
            font-size: 1.3em;
            padding: 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            text-align: center;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .shortcuts {
            font-size: 0.9em;
            opacity: 0.8;
        }

        .shortcuts kbd {
            background: rgba(255,255,255,0.2);
            padding: 3px 8px;
            border-radius: 4px;
            font-family: monospace;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2em;
            }
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🦮 Visual Navigation Assistant</h1>
            <p class="subtitle">AI-Powered Obstacle Detection for Visually Impaired Users</p>
        </header>

        <div class="main-content">
            <div class="video-section">
                <video id="videoElement" autoplay playsinline></video>
            </div>

            <div class="info-section">
                <div class="card">
                    <h2>Controls</h2>
                    <div class="controls">
                        <button id="startBtn">Start Navigation</button>
                        <button id="stopBtn" disabled>Stop</button>
                    </div>
                    <div id="status" class="status inactive">System Ready</div>
                    <div class="shortcuts">
                        <p><kbd>Space</kbd> Start/Stop • <kbd>M</kbd> Mute Audio</p>
                    </div>
                </div>

                <div class="card">
                    <h2>Current Guidance</h2>
                    <div id="currentMessage">Waiting to start...</div>
                </div>

                <div class="card">
                    <h2>Detected Objects</h2>
                    <div id="detectionsList">
                        <div class="no-detections">No objects detected yet</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('videoElement');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusDiv = document.getElementById('status');
        const messageDiv = document.getElementById('currentMessage');
        const detectionsList = document.getElementById('detectionsList');

        let stream = null;
        let detectionInterval = null;
        let isRunning = false;
        let isMuted = false;
        let currentAudio = null;
        let isAudioPlaying = false;

        // Initialize camera
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' },
                    audio: false 
                });
                video.srcObject = stream;
                return true;
            } catch (error) {
                console.error('Camera error:', error);
                alert('Unable to access camera. Please grant camera permissions.');
                return false;
            }
        }

        // Stop camera
        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                stream = null;
            }
        }

        // Capture frame from video
        function captureFrame() {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            return canvas.toDataURL('image/jpeg', 0.8);
        }

        // Send frame for detection
        async function detectObjects() {
            if (!isRunning) return;

            try {
                const imageData = captureFrame();
                
                const response = await fetch('/detect', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ image: imageData })
                });

                const data = await response.json();
                
                if (data.error) {
                    console.error('Detection error:', data.error);
                    return;
                }

                // Update UI
                updateDetections(data.detections);
                updateMessage(data.message);

                // Play audio guidance
                if (data.audio_file && !isMuted && !isAudioPlaying) {
                    playAudio(data.audio_file);
                }

            } catch (error) {
                console.error('Detection request error:', error);
            }
        }

        // Update detections list
        function updateDetections(detections) {
            if (!detections || detections.length === 0) {
                detectionsList.innerHTML = '<div class="no-detections">No obstacles detected</div>';
                return;
            }

            detectionsList.innerHTML = detections.map(det => `
                <div class="detection-item">
                    <strong>${det.object}</strong> - ${det.position}
                    <br><small>Confidence: ${(det.confidence * 100).toFixed(0)}% • ${det.distance}</small>
                </div>
            `).join('');
        }

        // Update current message
        function updateMessage(message) {
            messageDiv.textContent = message || 'Scanning...';
        }

        // Play audio
        function playAudio(filename) {
            // Stop current audio if playing
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }

            isAudioPlaying = true;
            currentAudio = new Audio(`/audio/${filename}`);
            
            // Reset flag when audio ends
            currentAudio.onended = () => {
                isAudioPlaying = false;
            };
            
            // Handle errors
            currentAudio.onerror = () => {
                isAudioPlaying = false;
                console.log('Audio play error');
            };
            
            currentAudio.play().catch(e => {
                isAudioPlaying = false;
                console.log('Audio play error:', e);
            });
        }

        // Start navigation
        async function startNavigation() {
            const cameraStarted = await startCamera();
            if (!cameraStarted) return;

            isRunning = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            statusDiv.textContent = 'Navigation Active';
            statusDiv.className = 'status active';

            // Start detection loop (every 2 seconds for less frequent updates)
            detectionInterval = setInterval(detectObjects, 2000);
        }

        // Stop navigation
        function stopNavigation() {
            isRunning = false;
            clearInterval(detectionInterval);
            stopCamera();

            startBtn.disabled = false;
            stopBtn.disabled = true;
            statusDiv.textContent = 'Navigation Stopped';
            statusDiv.className = 'status inactive';
            messageDiv.textContent = 'Stopped';
            detectionsList.innerHTML = '<div class="no-detections">Navigation stopped</div>';

            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            isAudioPlaying = false;
        }

        // Event listeners
        startBtn.addEventListener('click', startNavigation);
        stopBtn.addEventListener('click', stopNavigation);

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (isRunning) {
                    stopNavigation();
                } else {
                    startNavigation();
                }
            } else if (e.code === 'KeyM') {
                isMuted = !isMuted;
                alert(isMuted ? 'Audio muted' : 'Audio unmuted');
            }
        });

        // Initial message
        console.log('Visual Navigation Assistant loaded');
        console.log('Press Space to start/stop navigation');
    </script>
</body>
</html>
