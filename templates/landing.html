<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensable - Navigation</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body {
            background-color: #050510;
            color: #ffffff;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            animation: float 20s infinite ease-in-out;
            opacity: 0.6;
            pointer-events: none;
        }

        .orb-1 {
            width: 50vw; height: 50vw;
            background: #e11d48; /* hot pink */
            top: -10%; left: -10%;
            animation-duration: 25s;
        }

        .orb-2 {
            width: 60vw; height: 60vw;
            background: #4f46e5; /* indigo */
            bottom: -20%; right: -10%;
            animation-duration: 28s;
            animation-delay: -5s;
        }
        
        .orb-3 {
            width: 40vw; height: 40vw;
            background: #9333ea; /* vibrant purple */
            top: 40%; left: 30%;
            animation-duration: 22s;
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.1); }
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: enter 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes enter {
            from { opacity: 0; transform: scale(0.9) translateY(40px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        h1 {
            font-size: clamp(4rem, 12vw, 8rem);
            font-weight: 900;
            line-height: 1.1;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(165, 180, 252, 0.3);
            margin-bottom: 24px;
            letter-spacing: -2px;
        }

        .pulse-text {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: 600;
            color: #e0e7ff;
            opacity: 0.9;
            animation: heartbeat 2s infinite cubic-bezier(0.4, 0, 0.6, 1);
        }

        @keyframes heartbeat {
            0%, 100% { opacity: 1; text-shadow: 0 0 20px rgba(255,255,255,0.8); }
            50% { opacity: 0.7; text-shadow: none; }
        }
    </style>
</head>
<body onclick="window.location.href='/app'" tabindex="0" role="button" aria-label="Start Navigation App. Tap anywhere to continue.">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="content">
        <h1>SENSABLE</h1>
        <div class="pulse-text">TAP ANYWHERE TO START</div>
    </div>

    <script>
        document.body.focus();
        document.addEventListener("keydown", (e) => {
            if (e.code === "Enter" || e.code === "Space") {
                e.preventDefault();
                window.location.href = "/app";
            }
        });
    </script>
</body>
</html>
